# Readsmith self-host: the app plus Postgres, zero external services.
#   cp .env.example .env  &&  docker compose up
services:
  db:
    # Pin by digest in production for reproducibility.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readsmith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-readsmith}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-readsmith} -d ${POSTGRES_DB:-readsmith}"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-readsmith}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-readsmith}
      READSMITH_STORAGE_ROOT: /storage
      READSMITH_MIGRATIONS_DIR: /app/migrations
      # Content-bundle store driver; defaults to the local filesystem. With the
      # s3 profile, set STORAGE_DRIVER=s3 and the credentials in .env.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_REGION: ${STORAGE_REGION:-}
    volumes:
      # Docs pages are prerendered into the image at build time; the persisted
      # spec blobs live here so they survive restarts.
      - storage-data:/storage
    ports:
      - "${PORT:-4321}:4321"

  # Opt-in S3-compatible object storage for the content-bundle store:
  #   docker compose --profile s3 up
  # Point the app at it with STORAGE_DRIVER=s3 (see .env.example). The default
  # deployment does not need this; the local filesystem driver is the default.
  minio:
    image: minio/minio
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:-readsmith}
      # MinIO refuses to start without credentials (min 8 chars): set
      # STORAGE_SECRET_ACCESS_KEY in .env when using the s3 profile.
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:-}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: create the bucket on first start, then exit.
  minio-init:
    image: minio/mc
    profiles: ["s3"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${STORAGE_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:-readsmith}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-readsmith}

volumes:
  db-data:
  storage-data:
  minio-data:
