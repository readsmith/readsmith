# Readsmith's own docs, built from this repository's root: the config lives
# here and points at docs/ as the content root (the monorepo convention), so a
# git-connected deployment of this repo builds exactly the documentation site.
content:
  root: docs
site:
  name: Readsmith
  url: https://readsmith.dev/docs
  description: The Fair Source documentation platform. Precompiled MDX, a beautiful API reference, and agent-ready outputs from the first build.
variables:
  version: 0.8.0
footer:
  socials:
    github: https://github.com/readsmith/readsmith
tabs:
  - tab: Guides
    pages:
      - index
      - group: Start here
        pages:
          - what-is-readsmith
          - quickstart
          - comparisons
      - group: Authoring
        pages:
          - authoring/pages
          - authoring/markdown
          - authoring/code-blocks
          - authoring/diagrams
          - authoring/snippets-and-variables
          - authoring/images-and-links
      - group: Configuration
        pages:
          - configuration/overview
          - configuration/settings-reference
          - configuration/navigation
          - configuration/theming
          - configuration/analytics
      - group: API reference
        pages:
          - api-reference-guide/setup
          - api-reference-guide/hybrid-pages
          - api-reference-guide/schema-pages
      - group: AI and agents
        pages:
          - ai/search-and-ask
          - ai/search-api
          - ai/agent-outputs
          - ai/mcp
          - ai/agent-skills
  - tab: Components
    pages:
      - components/overview
      - group: Gallery
        pages:
          - components/callouts
          - components/accordions
          - components/tabs
          - components/steps
          - components/cards
          - components/code-groups
          - components/diagrams
          - components/frames
          - components/inline
          - components/updates
          - components/operation
  - tab: Self-host
    pages:
      - self-host/deploy
      - self-host/git-deploys
      - self-host/environment
      - self-host/reverse-proxy
      - self-host/security
      - self-host/upgrading
  - tab: Changelog
    pages:
      - changelog
# The API tab: Readsmith's own HTTP surface, rendered by its own pages-mode
# reference. The recursion is the point.
apiReference:
  spec: openapi.json
  layout: pages
  label: API
ai:
  chat:
    provider: gateway
    model: openai/gpt-4o-mini
  embedding:
    provider: gateway
    model: openai/text-embedding-3-small
