site:
  name: Readsmith
  url: https://docs.readsmith.dev
  description: The open-source documentation platform. Precompiled MDX, a beautiful API reference, and agent-ready outputs from the first build.
variables:
  version: 0.1.0
footer:
  socials:
    github: https://github.com/readsmith/readsmith
tabs:
  - tab: Guides
    pages:
      - index
      - group: Start here
        pages:
          - what-is-readsmith
          - quickstart
          - comparisons
      - group: Authoring
        pages:
          - authoring/pages
          - authoring/markdown
          - authoring/code-blocks
          - authoring/snippets-and-variables
          - authoring/images-and-links
      - group: Configuration
        pages:
          - configuration/overview
          - configuration/settings-reference
          - configuration/navigation
          - configuration/theming
  - tab: Components
    pages:
      - components/overview
      - group: Gallery
        pages:
          - components/callouts
          - components/accordions
          - components/tabs
          - components/steps
          - components/cards
          - components/code-groups
          - components/frames
          - components/inline
          - components/updates
          - components/operation
  - tab: Self-host
    pages:
      - self-host/deploy
      - self-host/environment
      - self-host/reverse-proxy
      - self-host/security
      - self-host/upgrading
  - tab: Changelog
    pages:
      - changelog
# The API tab (Readsmith's own HTTP surface, pages-mode reference) lands with
# the authored openapi.json.
